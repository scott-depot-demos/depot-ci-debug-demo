name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: depot-ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: depot/build-push-action@v1
        with:
          context: .
          load: true
          tags: myapp:ci

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL=$DATABASE_URL \
            myapp:ci \
            pytest tests/ -v
